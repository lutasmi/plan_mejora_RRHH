<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden;background:#0d1117}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#e6edf3}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#161b22}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
input,textarea,select,button{font-family:inherit}
input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:3px}
.card-node{position:absolute;cursor:grab;user-select:none;transition:box-shadow .15s,transform .1s}
.card-node:active{cursor:grabbing}
.card-node.selected{transform:translateY(-2px)}
.pillar-zone{position:absolute;top:0;bottom:0;pointer-events:none}
.row-band{position:absolute;left:0;right:0;pointer-events:none}
.panel-slide{transition:transform .2s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .18s ease forwards}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useLayoutEffect}=React;

// ── Supabase ─────────────────────────────────────────────────────────────────
const SUPA_URL="https://dlbysoybuanzfbgbqgwi.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsYnlzb3lidWFuemZiZ2JxZ3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTAxNzYsImV4cCI6MjA5MjUyNjE3Nn0.H1te91wXuuqwH0Farbz2Zt5eXeza0rBvlENLxh1Q18E";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const SKEY="canvas-v1";
const LKEY="canvas-local-v1";

async function dbLoad(){
  try{
    const{data,error}=await sb.from("canvas_data").select("value").eq("key",SKEY).single();
    if(!error&&data?.value){
      const parsed=JSON.parse(data.value);
      try{localStorage.setItem(LKEY,data.value);}catch(e){}
      return{data:parsed,src:"cloud"};
    }
  }catch(e){}
  try{
    const local=localStorage.getItem(LKEY);
    if(local)return{data:JSON.parse(local),src:"local"};
  }catch(e){}
  return{data:null,src:"none"};
}
async function dbSave(v){
  const str=JSON.stringify(v);
  try{localStorage.setItem(LKEY,str);}catch(e){}
  try{
    const{error}=await sb.from("canvas_data").upsert({key:SKEY,value:str},{onConflict:"key"});
    return !error;
  }catch(e){return false;}
}

// ── Constants ─────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const L={C:"consulta",S:"seguimiento",E:"editor"};
const LAYER_COLORS={[L.C]:"#1f6feb",[L.S]:"#9e6a03",[L.E]:"#238636"};

const DEFAULT_PILLARS=[
  {id:"pol",label:"Políticas",   color:"#0d1f3c",hl:"#388bfd",border:"#1f4080"},
  {id:"pro",label:"Procesos",    color:"#0d2818",hl:"#3fb950",border:"#1a5c32"},
  {id:"sis",label:"Sistemas",    color:"#2d1a00",hl:"#f0883e",border:"#6e3a00"},
  {id:"gov",label:"Gobierno",    color:"#2d0e0e",hl:"#f85149",border:"#6e1a1a"},
  {id:"efi",label:"Eficiencia",  color:"#0d2637",hl:"#39c5cf",border:"#0e5c6e"},
];
const DEFAULT_ROWS=[
  {id:"r1",label:"Alta / Contratación",   y:80,  h:160},
  {id:"r2",label:"Onboarding",            y:240, h:160},
  {id:"r3",label:"Cambios Contractuales", y:400, h:160},
  {id:"r4",label:"Retribución",           y:560, h:160},
  {id:"r5",label:"Desempeño",             y:720, h:160},
  {id:"r6",label:"Formación",             y:880, h:160},
  {id:"r7",label:"Promoción",             y:1040,h:160},
  {id:"r8",label:"Movilidad Interna",     y:1200,h:160},
  {id:"r9",label:"Expatriación",          y:1360,h:160},
  {id:"r10",label:"Desvinculación",       y:1520,h:160},
];
const PILLAR_W=320;
const ROW_LABEL_W=140;
const CARD_W=220;
const CARD_MIN_H=90;
const STEP_STATUS=[
  {id:"pendiente", label:"Pendiente", color:"#6e7681"},
  {id:"en_curso",  label:"En curso",  color:"#388bfd"},
  {id:"bloqueado", label:"Bloqueado", color:"#f85149"},
  {id:"completado",label:"Completado",color:"#3fb950"},
];
const nextSt=id=>{const i=STEP_STATUS.findIndex(s=>s.id===id);return STEP_STATUS[(i+1)%STEP_STATUS.length].id;};

const INIT_D={
  cards:[],
  pillars:DEFAULT_PILLARS,
  rows:DEFAULT_ROWS,
  owners:[
    {id:"o1",name:"Sin asignar",   color:"#6e7681"},
    {id:"o2",name:"HR Director",   color:"#f85149"},
    {id:"o3",name:"HR Ops",        color:"#388bfd"},
    {id:"o4",name:"Dir. Talento",  color:"#3fb950"},
    {id:"o5",name:"Legal",         color:"#f0883e"},
    {id:"o6",name:"IT",            color:"#bc8cff"},
  ],
  tags:[
    {id:"tg1",name:"Prioritario",color:"#f85149",tipo:"interna"},
    {id:"tg2",name:"En curso",   color:"#f0883e",tipo:"interna"},
    {id:"tg3",name:"Pendiente",  color:"#6e7681",tipo:"interna"},
    {id:"tg4",name:"Quick win",  color:"#3fb950",tipo:"publicada"},
  ],
  config:{passSegui:"seguimiento",passEditor:"editor"},
};

function migrate(d){
  if(!d.pillars)d.pillars=DEFAULT_PILLARS.map(p=>({...p}));
  if(!d.rows)   d.rows=DEFAULT_ROWS.map(r=>({...r}));
  if(!d.owners) d.owners=INIT_D.owners.map(o=>({...o}));
  if(!d.tags)   d.tags=INIT_D.tags.map(t=>({...t}));
  if(!d.config) d.config={passSegui:"seguimiento",passEditor:"editor"};
  if(!d.cards)  d.cards=[];
  d.cards=d.cards.map(c=>({
    steps:[],deps:[],publicado:false,completado:false,
    x:200,y:200,ownerId:"o1",tagIds:[],desc:"",url:"",
    ...c
  }));
  return d;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [D,setD]       =useState(null);
  const [loading,setLoading]=useState(true);
  const [saved,setSaved]=useState(true);
  const [saveOk,setSaveOk]=useState(true);
  const [layer,setLayer]=useState(L.C);
  const [loginOpen,setLoginOpen]=useState(false);
  const [selected,setSelected]=useState(null); // card id
  const [panel,setPanel]   =useState(null);    // "card"|"settings"|null
  const [fOwners,setFOwners]=useState([]);
  const [fTags,setFTags]   =useState([]);
  const saveTimer=useRef(null);

  useEffect(()=>{
    dbLoad().then(({data,src})=>{
      setD(migrate(data||JSON.parse(JSON.stringify(INIT_D))));
      setLoading(false);
    });
  },[]);

  useEffect(()=>{
    if(!D||loading)return;
    setSaved(false);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      dbSave(D).then(ok=>{setSaved(true);setSaveOk(ok);});
    },900);
    return()=>clearTimeout(saveTimer.current);
  },[D]);

  useEffect(()=>{
    const fn=()=>{if(D)try{localStorage.setItem(LKEY,JSON.stringify(D));}catch(e){}};
    window.addEventListener("beforeunload",fn);
    return()=>window.removeEventListener("beforeunload",fn);
  },[D]);

  const mut=fn=>setD(d=>{const nd=JSON.parse(JSON.stringify(d));fn(nd);return nd;});

  // Card ops
  const addCard=(x,y,pillarId,rowId)=>{
    const c={id:uid(),x,y,pillarId,rowId,name:"Nueva entrada",desc:"",url:"",
      ownerId:"o1",tagIds:[],publicado:false,completado:false,steps:[],deps:[]};
    mut(d=>d.cards.push(c));
    setSelected(c.id);setPanel("card");
  };
  const updateCard=c=>mut(d=>{const i=d.cards.findIndex(x=>x.id===c.id);if(i>=0)d.cards[i]=c;});
  const deleteCard=id=>{
    mut(d=>{d.cards=d.cards.filter(c=>c.id!==id).map(c=>({...c,deps:c.deps.filter(x=>x!==id)}));});
    setSelected(null);setPanel(null);
  };
  const moveCard=(id,x,y)=>mut(d=>{const c=d.cards.find(c=>c.id===id);if(c){c.x=x;c.y=y;}});

  const isVisible=c=>{
    if(!fOwners.length&&!fTags.length)return true;
    return(!fOwners.length||fOwners.includes(c.ownerId))&&
           (!fTags.length||fTags.some(t=>c.tagIds.includes(t)));
  };

  const canEdit=layer===L.E;
  const isPublic=layer===L.C;

  if(loading)return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:"9px",letterSpacing:"4px",color:"#388bfd"}}>CARGANDO</div>
    </div>
  );

  const selectedCard=D.cards.find(c=>c.id===selected);

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <Header D={D} layer={layer} saved={saved} saveOk={saveOk} canEdit={canEdit}
        fOwners={fOwners} setFOwners={setFOwners} fTags={fTags} setFTags={setFTags}
        onSettings={()=>setPanel(p=>p==="settings"?null:"settings")}
        onLogin={()=>setLoginOpen(true)} onLogout={()=>{setLayer(L.C);setPanel(null);setSelected(null);}}
        panelOpen={panel}/>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Canvas */}
        <Canvas D={D} layer={layer} canEdit={canEdit} isPublic={isPublic}
          selected={selected} setSelected={id=>{setSelected(id);if(id)setPanel("card");else setPanel(null);}}
          isVisible={isVisible} fOwners={fOwners} fTags={fTags}
          onMoveCard={moveCard} onAddCard={addCard}
          onDoubleClickCard={id=>{setSelected(id);setPanel("card");}}/>

        {/* Right panels */}
        {panel==="card"&&selectedCard&&(
          <CardPanel card={selectedCard} D={D} canEdit={canEdit} isPublic={isPublic}
            onUpdate={updateCard} onDelete={()=>deleteCard(selectedCard.id)}
            onClose={()=>{setPanel(null);setSelected(null);}}/>
        )}
        {panel==="settings"&&canEdit&&(
          <SettingsPanel D={D} mut={mut} onClose={()=>setPanel(null)}/>
        )}
      </div>

      {loginOpen&&<LoginModal D={D} onLogin={role=>{setLayer(role);setLoginOpen(false);}} onClose={()=>setLoginOpen(false)}/>}
    </div>
  );
}

      })}
      {(fOwners.length>0||fTags.length>0)&&<button onClick={()=>{setFOwners([]);setFTags([]);}} style={{...BTN,color:"#484f58",borderColor:"transparent",fontSize:"10px"}}>× limpiar</button>}
      <div style={{flex:1}}/>
      {canEdit&&<span style={{fontSize:"9px",color:saved?(saveOk?"#3fb950":"#f0883e"):"#f0883e",minWidth:90}}>
        {saved?(saveOk?"☁ guardado":"⚠ solo local"):"⏳ guardando…"}
      </span>}
      {canEdit&&<button onClick={onSettings} style={{...BTN,borderColor:panelOpen==="settings"?"#388bfd":"#30363d",color:panelOpen==="settings"?"#388bfd":"#8b949e"}}>⚙ Config</button>}
      {layer===L.C
        ?<button onClick={onLogin} style={{...BTN,borderColor:"#388bfd",color:"#388bfd"}}>Acceder →</button>
        :<button onClick={onLogout} style={{...BTN,color:"#484f58"}}>← Salir</button>
      }
    </div>
  );
}

// ── Canvas ─────────────────────────────────────────────────────────────────────
function Canvas({D,layer,canEdit,isPublic,selected,setSelected,isVisible,fOwners,fTags,onMoveCard,onAddCard,onDoubleClickCard}){
  const svgRef=useRef(null);
  const containerRef=useRef(null);
  const [vp,setVp]=useState({x:ROW_LABEL_W,y:0,scale:1}); // viewport: pan + zoom
  const dragging=useRef(null); // {type:"pan"|"card", id?, startX,startY,origX,origY,cardOrigX,cardOrigY}
  const [size,setSize]=useState({w:1200,h:800});

  // Measure container
  useLayoutEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(()=>{
      const r=containerRef.current.getBoundingClientRect();
      setSize({w:r.width,h:r.height});
    });
    ro.observe(containerRef.current);
    setSize({w:containerRef.current.clientWidth,h:containerRef.current.clientHeight});
    return()=>ro.disconnect();
  },[]);

  // Canvas dimensions
  const totalH=D.rows.reduce((s,r)=>Math.max(s,r.y+r.h),200)+200;
  const totalW=ROW_LABEL_W+D.pillars.length*PILLAR_W+200;

  // Pointer events
  const onPointerDown=e=>{
    e.currentTarget.setPointerCapture(e.pointerId);
    const t=e.target;
    // Check if clicking on a card
    const cardEl=t.closest('[data-cardid]');
    if(cardEl&&canEdit){
      const id=cardEl.dataset.cardid;
      const card=D.cards.find(c=>c.id===id);
      if(!card)return;
      dragging.current={type:"card",id,startX:e.clientX,startY:e.clientY,cardOrigX:card.x,cardOrigY:card.y};
      setSelected(id);
      return;
    }
    // Pan
    dragging.current={type:"pan",startX:e.clientX,startY:e.clientY,origX:vp.x,origY:vp.y};
  };
  const onPointerMove=e=>{
    if(!dragging.current)return;
    const dx=e.clientX-dragging.current.startX;
    const dy=e.clientY-dragging.current.startY;
    if(dragging.current.type==="pan"){
      setVp(v=>({...v,x:dragging.current.origX+dx,y:dragging.current.origY+dy}));
    } else if(dragging.current.type==="card"){
      const nx=dragging.current.cardOrigX+dx/vp.scale;
      const ny=dragging.current.cardOrigY+dy/vp.scale;
      onMoveCard(dragging.current.id,nx,ny);
    }
  };
  const onPointerUp=e=>{
    dragging.current=null;
  };
  const onWheel=e=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.1:0.9;
    const rect=containerRef.current.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    setVp(v=>{
      const ns=Math.min(2,Math.max(0.2,v.scale*factor));
      const ratio=ns/v.scale;
      return{scale:ns,x:mx-(mx-v.x)*ratio,y:my-(my-v.y)*ratio};
    });
  };

  // Double-click to add card
  const onDblClick=e=>{
    if(!canEdit)return;
    const t=e.target;
    if(t.closest('[data-cardid]'))return;
    const rect=containerRef.current.getBoundingClientRect();
    const cx=(e.clientX-rect.left-vp.x)/vp.scale;
    const cy=(e.clientY-rect.top-vp.y)/vp.scale;
    // Detect pillar and row
    const pillarIdx=Math.floor((cx-ROW_LABEL_W)/PILLAR_W);
    const pillar=D.pillars[pillarIdx];
    const row=D.rows.find(r=>cy>=r.y&&cy<r.y+r.h);
    onAddCard(cx,cy,pillar?.id,row?.id);
  };

  // Visible cards
  const visibleCards=isPublic?D.cards.filter(c=>c.publicado):D.cards;

  // Bezier arrow between two cards
  const getArrow=(fromCard,toCard)=>{
    const fx=fromCard.x+CARD_W;
    const fy=fromCard.y+CARD_MIN_H/2;
    const tx=toCard.x;
    const ty=toCard.y+CARD_MIN_H/2;
    const cx1=fx+Math.abs(tx-fx)*0.5;
    const cx2=tx-Math.abs(tx-fx)*0.5;
    return `M${fx},${fy} C${cx1},${fy} ${cx2},${ty} ${tx},${ty}`;
  };

  return(
    <div ref={containerRef} style={{flex:1,overflow:"hidden",position:"relative",cursor:"grab",background:"#0d1117"}}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}
      onWheel={onWheel} onDoubleClick={onDblClick}>

      {/* SVG Canvas */}
      <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",overflow:"visible"}}>
        <g transform={`translate(${vp.x},${vp.y}) scale(${vp.scale})`}>

          {/* Row bands */}
          {D.rows.map((row,ri)=>(
            <g key={row.id}>
              <rect x={0} y={row.y} width={totalW} height={row.h}
                fill={ri%2===0?"#0d1117":"#111720"} opacity={1}/>
              {/* Row label */}
              <rect x={0} y={row.y} width={ROW_LABEL_W-1} height={row.h} fill="#161b22"/>
              <line x1={ROW_LABEL_W-1} y1={row.y} x2={ROW_LABEL_W-1} y2={row.y+row.h} stroke="#21262d" strokeWidth={1}/>
              <text x={ROW_LABEL_W/2} y={row.y+row.h/2} textAnchor="middle" dominantBaseline="middle"
                fontSize={11} fontWeight={600} fill="#484f58" style={{userSelect:"none"}}>
                {row.label}
              </text>
              {/* Row bottom border */}
              <line x1={0} y1={row.y+row.h} x2={totalW} y2={row.y+row.h} stroke="#21262d" strokeWidth={1}/>
            </g>
          ))}

          {/* Pillar zones */}
          {D.pillars.map((p,pi)=>{
            const px=ROW_LABEL_W+pi*PILLAR_W;
            return(
              <g key={p.id}>
                {/* Pillar color overlay */}
                <rect x={px} y={0} width={PILLAR_W} height={totalH}
                  fill={p.color} opacity={0.4}/>
                {/* Pillar right border */}
                <line x1={px+PILLAR_W} y1={0} x2={px+PILLAR_W} y2={totalH} stroke={p.border} strokeWidth={1}/>
                {/* Pillar header */}
                <rect x={px} y={0} width={PILLAR_W} height={44} fill={p.color}/>
                <line x1={px} y1={44} x2={px+PILLAR_W} y2={44} stroke={p.border} strokeWidth={1.5}/>
                <text x={px+PILLAR_W/2} y={22} textAnchor="middle" dominantBaseline="middle"
                  fontSize={12} fontWeight={700} fill={p.hl} style={{userSelect:"none",letterSpacing:"0.5px"}}>
                  {p.label}
                </text>
              </g>
            );
          })}

          {/* Dependency arrows */}
          <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
              <path d="M0,1 L7,4 L0,7 Z" fill="#388bfd" opacity="0.7"/>
            </marker>
          </defs>
          {visibleCards.map(card=>(card.deps||[]).map(depId=>{
            const dep=D.cards.find(c=>c.id===depId);
            if(!dep)return null;
            const vis=isVisible(card)&&isVisible(dep);
            return(
              <path key={depId+">"+card.id}
                d={getArrow(dep,card)}
                stroke="#388bfd" strokeWidth={1.5} fill="none"
                strokeOpacity={vis?0.5:0.1}
                strokeDasharray="none"
                markerEnd="url(#arr)"/>
            );
          }))}

          {/* Cards */}
          {visibleCards.map(card=>{
            const owner=D.owners.find(o=>o.id===card.ownerId)||D.owners[0];
            const tags=D.tags.filter(t=>card.tagIds.includes(t.id));
            const pillar=D.pillars.find(p=>p.id===card.pillarId);
            const vis=isVisible(card);
            const isSel=selected===card.id;
            const steps=card.steps||[];
            const doneSteps=steps.filter(s=>s.status==="completado").length;
            const blockedSteps=steps.some(s=>s.status==="bloqueado");
            return(
              <foreignObject key={card.id}
                x={card.x} y={card.y} width={CARD_W} height={CARD_MIN_H+steps.length*0+80}
                style={{overflow:"visible"}}>
                <div xmlns="http://www.w3.org/1999/xhtml"
                  data-cardid={card.id}
                  style={{
                    width:CARD_W,
                    background:card.completado?"#0d2018":blockedSteps?"#1c0f0f":"#161b22",
                    border:`1.5px solid ${isSel?pillar?.hl||"#388bfd":card.completado?"#238636":blockedSteps?"#f85149":pillar?.border||"#21262d"}`,
                    borderTop:`3px solid ${owner.color}`,
                    borderRadius:8,
                    padding:"10px 11px 9px",
                    opacity:(!vis&&(fOwners.length>0||fTags.length>0))?0.08:1,
                    boxShadow:isSel?`0 0 0 2px ${pillar?.hl||"#388bfd"}44,0 8px 24px #00000066`:"0 2px 8px #00000044",
                    transition:"opacity .2s,box-shadow .15s",
                    cursor:canEdit?"grab":"pointer",
                  }}>
                  {/* Top: name + pillar badge */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
                    <div style={{flex:1,fontSize:12,fontWeight:600,color:card.completado?"#3fb950":"#e6edf3",lineHeight:1.35}}>
                      {card.completado&&<span style={{color:"#3fb950",marginRight:4,fontSize:10}}>✓</span>}
                      {card.name}
                    </div>
                    {pillar&&<span style={{fontSize:"8px",padding:"1px 5px",borderRadius:3,background:pillar.color,color:pillar.hl,border:`1px solid ${pillar.border}`,whiteSpace:"nowrap",flexShrink:0,fontWeight:600}}>{pillar.label}</span>}
                  </div>
                  {/* Owner */}
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:owner.color,flexShrink:0}}/>
                    <span style={{fontSize:10,color:owner.color,fontWeight:500}}>{owner.name}</span>
                  </div>
                  {/* Tags */}
                  {tags.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:5}}>
                      {tags.map(t=><span key={t.id} style={{fontSize:"8px",padding:"1px 5px",borderRadius:10,background:t.color+"22",color:t.color,border:`1px solid ${t.color}33`,fontWeight:500}}>{t.name}</span>)}
                    </div>
                  )}
                  {/* Steps progress */}
                  {steps.length>0&&(
                    <div style={{marginTop:4}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:"8px",color:"#484f58"}}>Pasos</span>
                        <span style={{fontSize:"8px",color:blockedSteps?"#f85149":doneSteps===steps.length?"#3fb950":"#484f58",fontWeight:600}}>{doneSteps}/{steps.length}</span>
                      </div>
                      <div style={{height:3,background:"#21262d",borderRadius:2}}>
                        <div style={{height:"100%",width:`${steps.length?doneSteps/steps.length*100:0}%`,background:blockedSteps?"#f85149":"#3fb950",borderRadius:2,transition:"width .3s"}}/>
                      </div>
                    </div>
                  )}
                  {/* URL indicator */}
                  {card.url&&<div style={{marginTop:4,fontSize:"8px",color:"#388bfd"}}>🔗 doc</div>}
                </div>
              </foreignObject>
            );
          })}

          {/* Canvas size */}
          <rect x={0} y={0} width={totalW} height={totalH} fill="none"/>
        </g>
      </svg>

      {/* Hint */}
      {canEdit&&(
        <div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",fontSize:"9px",color:"#30363d",letterSpacing:"1px",pointerEvents:"none",whiteSpace:"nowrap"}}>
          Doble clic para añadir · Arrastra para mover · Rueda para zoom
        </div>
      )}

      {/* Zoom controls */}
      <div style={{position:"absolute",bottom:12,right:12,display:"flex",flexDirection:"column",gap:4}}>
        <button onClick={()=>setVp(v=>({...v,scale:Math.min(2,v.scale*1.2)}))} style={{...ICONBTN}}>+</button>
        <button onClick={()=>setVp(v=>({...v,scale:Math.max(0.2,v.scale/1.2)}))} style={{...ICONBTN}}>−</button>
        <button onClick={()=>setVp({x:ROW_LABEL_W,y:0,scale:1})} style={{...ICONBTN,fontSize:9}}>⌂</button>
      </div>
    </div>
  );
}

// ── Card Panel ────────────────────────────────────────────────────────────────
function CardPanel({card,D,canEdit,isPublic,onUpdate,onDelete,onClose}){
  const [f,setF]=useState({...card,steps:(card.steps||[]).map(s=>({...s}))});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{setF({...card,steps:(card.steps||[]).map(s=>({...s}))});},[card.id]);

  const save=()=>onUpdate(f);
  const owner=D.owners.find(o=>o.id===f.ownerId)||D.owners[0];
  const pillar=D.pillars.find(p=>p.id===f.pillarId);
  const row=D.rows.find(r=>r.id===f.rowId);

  const addStep=()=>setF(p=>({...p,steps:[...p.steps,{id:uid(),name:"Nuevo paso",desc:"",ownerId:p.ownerId,status:"pendiente"}]}));
  const upStep=(id,k,v)=>setF(p=>({...p,steps:p.steps.map(s=>s.id===id?{...s,[k]:v}:s)}));
  const delStep=id=>setF(p=>({...p,steps:p.steps.filter(s=>s.id!==id)}));

  // Public view: simplified
  if(isPublic){
    return(
      <div className="panel-slide fade-up" style={{width:320,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
        <div style={{padding:"16px",background:pillar?.color||"#161b22",borderBottom:`1px solid ${pillar?.border||"#21262d"}`}}>
          <button onClick={onClose} style={{float:"right",background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
          {pillar&&<div style={{fontSize:"8px",letterSpacing:"2px",color:pillar.hl,marginBottom:4,fontWeight:600}}>{pillar.label} · {row?.label}</div>}
          <div style={{fontSize:18,fontWeight:700,color:"#e6edf3",lineHeight:1.3}}>{card.name}</div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
          {card.desc&&<div style={{fontSize:13,color:"#8b949e",lineHeight:1.7}}>{card.desc}</div>}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:owner.color}}/>
            <span style={{fontSize:12,color:owner.color,fontWeight:600}}>{owner.name}</span>
          </div>
          {D.tags.filter(t=>card.tagIds.includes(t.id)&&t.tipo==="publicada").map(t=>(
            <span key={t.id} style={{fontSize:10,background:t.color+"22",color:t.color,padding:"3px 10px",borderRadius:20,border:`1px solid ${t.color}44`,fontWeight:500,alignSelf:"flex-start"}}>{t.name}</span>
          ))}
          {card.url&&<a href={card.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#21262d",borderRadius:6,color:"#388bfd",fontSize:12,fontWeight:600,textDecoration:"none"}}>🔗 Abrir documento →</a>}
        </div>
      </div>
    );
  }

  return(
    <div className="panel-slide" style={{width:340,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      {/* Panel header */}
      <div style={{padding:"12px 14px",background:pillar?.color||"#161b22",borderBottom:`1px solid ${pillar?.border||"#21262d"}`,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            {pillar&&<div style={{fontSize:"8px",letterSpacing:"2px",color:pillar.hl,marginBottom:2,fontWeight:600}}>{pillar.label}{row&&" · "+row.label}</div>}
            <div style={{fontSize:13,fontWeight:700,color:"#e6edf3"}}>Editar entrada</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>✕</button>
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:12}}>
        {/* Status toggles */}
        <div style={{display:"flex",gap:8}}>
          <Toggle active={f.publicado} color="#388bfd" onClick={()=>{set("publicado",!f.publicado);}} label={f.publicado?"◆ Publicado":"◇ Privado"}/>
          <Toggle active={f.completado} color="#3fb950" onClick={()=>{set("completado",!f.completado);}} label={f.completado?"✓ Completado":"○ En curso"}/>
        </div>

        <Fld label="NOMBRE"><input value={f.name} onChange={e=>set("name",e.target.value)} style={INP}/></Fld>
        <Fld label="DESCRIPCIÓN"><textarea value={f.desc} onChange={e=>set("desc",e.target.value)} rows={3} style={{...INP,resize:"vertical",lineHeight:1.6}}/></Fld>
        <Fld label="ENLACE / DOCUMENTO">
          <input value={f.url} onChange={e=>set("url",e.target.value)} placeholder="https://…" style={INP}/>
          {f.url&&<a href={f.url} target="_blank" rel="noreferrer" style={{fontSize:9,color:"#388bfd",display:"block",marginTop:3}}>↗ abrir</a>}
        </Fld>

        {/* Pillar + Row selectors */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Fld label="PILAR">
            <select value={f.pillarId||""} onChange={e=>set("pillarId",e.target.value)} style={INP}>
              <option value="">Sin pilar</option>
              {D.pillars.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
          </Fld>
          <Fld label="ETAPA">
            <select value={f.rowId||""} onChange={e=>set("rowId",e.target.value)} style={INP}>
              <option value="">Sin etapa</option>
              {D.rows.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
            </select>
          </Fld>
        </div>

        <Fld label="OWNER">
          <select value={f.ownerId} onChange={e=>set("ownerId",e.target.value)} style={{...INP,color:owner.color}}>
            {D.owners.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
          </select>
          <div style={{height:2,borderRadius:1,marginTop:4,background:owner.color}}/>
        </Fld>

        <Fld label="ETIQUETAS">
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {D.tags.map(t=>{
              const sel=f.tagIds.includes(t.id);
              return<Chip key={t.id} color={t.color} active={sel}
                onClick={()=>set("tagIds",sel?f.tagIds.filter(x=>x!==t.id):[...f.tagIds,t.id])}>
                {t.tipo==="publicada"&&"◆ "}{t.name}
              </Chip>;
            })}
          </div>
        </Fld>

        <Fld label="DEPENDENCIAS">
          <DepSelect value={f.deps} onChange={v=>set("deps",v)}
            cards={D.cards} currentId={card.id} D={D}/>
        </Fld>

        {/* Steps */}
        <Fld label={`PASOS (${f.steps.length})`}>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {f.steps.map((step,si)=>{
              const st=STEP_STATUS.find(s=>s.id===step.status)||STEP_STATUS[0];
              const sOwner=D.owners.find(o=>o.id===step.ownerId)||D.owners[0];
              return(
                <div key={step.id} style={{background:"#0d1117",border:"1px solid #21262d",borderLeft:`3px solid ${st.color}`,borderRadius:5,padding:"8px 9px"}}>
                  <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:6}}>
                    <button onClick={()=>upStep(step.id,"status",nextSt(step.status))}
                      style={{background:"#161b22",border:`1px solid ${st.color}`,color:st.color,cursor:"pointer",padding:"1px 7px",borderRadius:10,fontSize:"8px",fontWeight:600,fontFamily:"inherit",flexShrink:0}}>
                      {st.label}
                    </button>
                    <input value={step.name} onChange={e=>upStep(step.id,"name",e.target.value)}
                      style={{...INP,flex:1,padding:"3px 6px",fontSize:11,fontWeight:600}}/>
                    <button onClick={()=>delStep(step.id)} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:12,padding:0,flexShrink:0}}>✕</button>
                  </div>
                  <textarea value={step.desc||""} onChange={e=>upStep(step.id,"desc",e.target.value)}
                    rows={1} placeholder="Descripción del paso…"
                    style={{...INP,fontSize:10,resize:"none",marginBottom:5,lineHeight:1.5}}/>
                  <select value={step.ownerId||""} onChange={e=>upStep(step.id,"ownerId",e.target.value)}
                    style={{...INP,fontSize:10,padding:"2px 5px",color:sOwner.color}}>
                    {D.owners.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
                  </select>
                </div>
              );
            })}
          </div>
          <button onClick={addStep} style={{...BTN,width:"100%",marginTop:6,borderStyle:"dashed",padding:"5px"}}>+ añadir paso</button>
        </Fld>
      </div>

      <div style={{padding:"10px 14px",borderTop:"1px solid #21262d",display:"flex",gap:8,flexShrink:0}}>
        <button onClick={()=>{save();onClose();}} style={{flex:1,background:"#1f6feb",border:"none",color:"#fff",padding:"8px",cursor:"pointer",fontSize:11,borderRadius:5,fontFamily:"inherit",fontWeight:700}}>GUARDAR</button>
        <button onClick={save} style={{...BTN,padding:"8px 10px",fontSize:10}}>💾</button>
        <button onClick={()=>{if(window.confirm("¿Eliminar?"))onDelete();}} style={{...BTN,padding:"8px 10px",color:"#f85149",borderColor:"#f8514933"}}>🗑</button>
      </div>
    </div>
  );
}

// ── Dep select ─────────────────────────────────────────────────────────────────
function DepSelect({value,onChange,cards,currentId,D}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const others=cards.filter(c=>c.id!==currentId);
  const filtered=q?others.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())):others;
  const toggle=id=>onChange(value.includes(id)?value.filter(x=>x!==id):[...value,id]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{...INP,textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",color:value.length?"#e6edf3":"#484f58"}}>
        <span>{value.length?`${value.length} dependencia${value.length>1?"s":""}`:"Seleccionar…"}</span>
        <span style={{color:"#484f58",fontSize:10}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:300,background:"#161b22",border:"1px solid #30363d",borderRadius:5,marginTop:2,boxShadow:"0 8px 24px #000a",maxHeight:200,display:"flex",flexDirection:"column"}}>
          <div style={{padding:5,borderBottom:"1px solid #21262d",flexShrink:0}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar…" autoFocus style={{...INP,padding:"3px 7px",fontSize:10}}/>
          </div>
          <div style={{overflow:"auto",flex:1}}>
            {filtered.length===0&&<div style={{padding:"8px 10px",fontSize:10,color:"#484f58"}}>Sin resultados</div>}
            {filtered.map(c=>{
              const p=D.pillars.find(x=>x.id===c.pillarId);
              const sel=value.includes(c.id);
              return(
                <div key={c.id} onClick={()=>toggle(c.id)}
                  style={{padding:"6px 9px",cursor:"pointer",display:"flex",gap:7,alignItems:"flex-start",background:sel?"#1f2d3d":"transparent",borderBottom:"1px solid #0d1117"}}>
                  <input type="checkbox" checked={sel} readOnly style={{marginTop:2,accentColor:"#388bfd",flexShrink:0,cursor:"pointer"}}/>
                  <div>
                    <div style={{fontSize:11,color:sel?"#e6edf3":"#6e7681",lineHeight:1.3}}>{c.name}</div>
                    {p&&<div style={{fontSize:8,color:p.hl,marginTop:1}}>{p.label}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Settings Panel ─────────────────────────────────────────────────────────────
function SettingsPanel({D,mut,onClose}){
  const addOwner=()=>mut(d=>d.owners.push({id:"o"+uid(),name:"Nuevo responsable",color:"#388bfd"}));
  const upOwner=(id,k,v)=>mut(d=>{const o=d.owners.find(o=>o.id===id);if(o)o[k]=v;});
  const delOwner=id=>mut(d=>{if(d.owners.length<=1)return;d.owners=d.owners.filter(o=>o.id!==id);const fb=d.owners[0].id;d.cards=d.cards.map(c=>({...c,ownerId:c.ownerId===id?fb:c.ownerId}));});

  const addTag=()=>mut(d=>d.tags.push({id:"tg"+uid(),name:"Nueva etiqueta",color:"#388bfd",tipo:"interna"}));
  const upTag=(id,k,v)=>mut(d=>{const t=d.tags.find(t=>t.id===id);if(t)t[k]=v;});
  const delTag=id=>mut(d=>{d.tags=d.tags.filter(t=>t.id!==id);d.cards=d.cards.map(c=>({...c,tagIds:c.tagIds.filter(x=>x!==id)}));});

  const addRow=()=>mut(d=>{const last=d.rows[d.rows.length-1];d.rows.push({id:"r"+uid(),label:"Nueva etapa",y:(last?last.y+last.h:0)+40,h:160});});
  const upRow=(id,k,v)=>mut(d=>{const r=d.rows.find(r=>r.id===id);if(r)r[k]=v;});
  const delRow=id=>mut(d=>{d.rows=d.rows.filter(r=>r.id!==id);d.cards=d.cards.map(c=>({...c,rowId:c.rowId===id?null:c.rowId}));});

  const upPillar=(id,k,v)=>mut(d=>{const p=d.pillars.find(p=>p.id===id);if(p)p[k]=v;});
  const upConf=(k,v)=>mut(d=>{d.config[k]=v;});

  return(
    <div style={{width:300,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"12px 14px",borderBottom:"1px solid #21262d",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:11,letterSpacing:"1px",color:"#3fb950",fontWeight:700}}>⚙ CONFIGURACIÓN</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>✕</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:20}}>

        <Sec title="CONTRASEÑAS">
          <Fld label="SEGUIMIENTO"><input value={D.config?.passSegui||""} onChange={e=>upConf("passSegui",e.target.value)} style={INP}/></Fld>
          <div style={{height:8}}/>
          <Fld label="EDITOR"><input value={D.config?.passEditor||""} onChange={e=>upConf("passEditor",e.target.value)} style={INP}/></Fld>
        </Sec>

        <Sec title="PILARES — COLOR">
          {D.pillars.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
              <input type="color" value={p.hl} onChange={e=>upPillar(p.id,"hl",e.target.value)}
                style={{width:28,height:28,border:"2px solid #21262d",borderRadius:4,flexShrink:0,background:"none",cursor:"pointer",padding:2}}/>
              <span style={{fontSize:12,color:p.hl,fontWeight:600,flex:1}}>{p.label}</span>
            </div>
          ))}
        </Sec>

        <Sec title="ETAPAS DEL CICLO">
          {D.rows.map(r=>(
            <div key={r.id} style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}>
              <input value={r.label} onChange={e=>upRow(r.id,"label",e.target.value)} style={{...INP,flex:1,padding:"4px 7px",fontSize:11}}/>
              <button onClick={()=>delRow(r.id)} style={{background:"none",border:"1px solid #21262d",color:"#484f58",cursor:"pointer",padding:"3px 7px",borderRadius:3,fontSize:11,flexShrink:0}}>✕</button>
            </div>
          ))}
          <button onClick={addRow} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"5px"}}>+ etapa</button>
        </Sec>

        <Sec title="OWNERS">
          {D.owners.map(o=>(
            <div key={o.id} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
              <input type="color" value={o.color} onChange={e=>upOwner(o.id,"color",e.target.value)}
                style={{width:28,height:28,border:"2px solid #21262d",borderRadius:4,flexShrink:0,background:"none",cursor:"pointer",padding:2}}/>
              <input value={o.name} onChange={e=>upOwner(o.id,"name",e.target.value)} style={{...INP,flex:1,padding:"4px 7px",fontSize:11,borderColor:o.color+"66"}}/>
              <button onClick={()=>delOwner(o.id)} style={{background:"none",border:"1px solid #21262d",color:"#484f58",cursor:"pointer",padding:"3px 7px",borderRadius:3,fontSize:11,flexShrink:0}}>✕</button>
            </div>
          ))}
          <button onClick={addOwner} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"5px"}}>+ owner</button>
        </Sec>

        <Sec title="ETIQUETAS">
          <p style={{fontSize:9,color:"#484f58",marginBottom:8,lineHeight:1.5}}>◆ Publicada = visible en capa pública</p>
          {D.tags.map(t=>(
            <div key={t.id} style={{display:"flex",gap:6,marginBottom:7,alignItems:"center"}}>
              <input type="color" value={t.color} onChange={e=>upTag(t.id,"color",e.target.value)}
                style={{width:28,height:28,border:"2px solid #21262d",borderRadius:4,flexShrink:0,background:"none",cursor:"pointer",padding:2}}/>
              <input value={t.name} onChange={e=>upTag(t.id,"name",e.target.value)} style={{...INP,flex:1,padding:"4px 7px",fontSize:11,borderColor:t.color+"66"}}/>
              <button onClick={()=>upTag(t.id,"tipo",t.tipo==="publicada"?"interna":"publicada")}
                style={{background:t.tipo==="publicada"?"#0d2818":"#1c2128",border:`1px solid ${t.tipo==="publicada"?"#238636":"#30363d"}`,color:t.tipo==="publicada"?"#3fb950":"#484f58",cursor:"pointer",padding:"3px 6px",borderRadius:3,fontSize:8,fontWeight:700,flexShrink:0}}>
                {t.tipo==="publicada"?"◆":"○"}
              </button>
              <button onClick={()=>delTag(t.id)} style={{background:"none",border:"1px solid #21262d",color:"#484f58",cursor:"pointer",padding:"3px 7px",borderRadius:3,fontSize:11,flexShrink:0}}>✕</button>
            </div>
          ))}
          <button onClick={addTag} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"5px"}}>+ etiqueta</button>
        </Sec>
      </div>
    </div>
  );
}

// ── Login Modal ───────────────────────────────────────────────────────────────
function LoginModal({D,onLogin,onClose}){
  const [pass,setPass]=useState("");
  const [err,setErr]=useState(false);
  const check=()=>{
    if(pass===D.config?.passEditor){onLogin(L.E);return;}
    if(pass===D.config?.passSegui){onLogin(L.S);return;}
    setErr(true);setTimeout(()=>setErr(false),1500);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:28,width:320,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{fontSize:9,letterSpacing:"4px",color:"#388bfd",textAlign:"center"}}>ACCESO RESTRINGIDO</div>
        <div style={{fontSize:18,fontWeight:700,color:"#e6edf3",textAlign:"center"}}>Introduce la contraseña</div>
        <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Contraseña…" autoFocus
          style={{...INP,fontSize:14,padding:"9px 12px",textAlign:"center",letterSpacing:"3px",borderColor:err?"#f85149":"#30363d"}}/>
        {err&&<div style={{fontSize:11,color:"#f85149",textAlign:"center"}}>Contraseña incorrecta</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,...BTN,padding:"9px"}}>Cancelar</button>
          <button onClick={check} style={{flex:2,background:"#1f6feb",border:"none",color:"#fff",padding:"9px",cursor:"pointer",fontSize:12,borderRadius:5,fontFamily:"inherit",fontWeight:700}}>Acceder</button>
        </div>
      </div>
    </div>
  );
}

// ── Micro components ──────────────────────────────────────────────────────────
const Fld=({label,children})=>(<div><div style={{fontSize:"7px",letterSpacing:"2px",color:"#484f58",marginBottom:4,fontWeight:700}}>{label}</div>{children}</div>);
const Sec=({title,children})=>(<div><div style={{fontSize:"8px",letterSpacing:"3px",color:"#30363d",marginBottom:9,paddingBottom:5,borderBottom:"1px solid #21262d",fontWeight:700}}>{title}</div>{children}</div>);
const Chip=({children,color,active,onClick})=>(<button onClick={onClick} style={{fontSize:9,padding:"2px 9px",borderRadius:20,border:`1.5px solid ${color}`,background:active?color:"transparent",color:active?"#fff":color,cursor:"pointer",transition:"all .12s",fontFamily:"inherit",fontWeight:600,lineHeight:1.4}}>{children}</button>);
const Toggle=({active,color,onClick,label})=>(<button onClick={onClick} style={{flex:1,fontSize:9,padding:"4px 8px",borderRadius:5,border:`1px solid ${active?color:"#30363d"}`,background:active?color+"22":"transparent",color:active?color:"#484f58",cursor:"pointer",fontFamily:"inherit",fontWeight:600,letterSpacing:"0.3px",transition:"all .15s"}}>{label}</button>);
const INP={background:"#0d1117",border:"1px solid #30363d",color:"#e6edf3",padding:"6px 8px",fontSize:11,borderRadius:4,fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box"};
const BTN={background:"transparent",border:"1px solid #30363d",color:"#8b949e",cursor:"pointer",padding:"4px 10px",fontSize:9,letterSpacing:"0.5px",borderRadius:4,fontFamily:"inherit"};
const ICONBTN={background:"#161b22",border:"1px solid #30363d",color:"#8b949e",cursor:"pointer",width:28,height:28,borderRadius:4,fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
