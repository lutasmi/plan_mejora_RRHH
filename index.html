async function dbLoad(){
  try{
    const{data,error}=await sb.from("canvas_data").select("value").eq("key",SKEY).single();
    if(!error&&data?.value){
      const p=JSON.parse(data.value);
      try{localStorage.setItem(LKEY,data.value);}catch(e){}
      return{data:p,src:"cloud"};
    }
  }catch(e){}
  try{const l=localStorage.getItem(LKEY);if(l)return{data:JSON.parse(l),src:"local"};}catch(e){}
  return{data:null,src:"none"};
}
async function dbSave(v){
  const s=JSON.stringify(v);
  try{localStorage.setItem(LKEY,s);}catch(e){}
  try{const{error}=await sb.from("canvas_data").upsert({key:SKEY,value:s},{onConflict:"key"});return !error;}
  catch(e){return false;}
}

const nextSt=id=>{const i=STEP_ST.findIndex(s=>s.id===id);return STEP_ST[(i+1)%STEP_ST.length].id;};

const ROW_LBL_W=148;
const CARD_W=210;
const HDR_H=44;
const CARD_PAD=16; // padding inside row for auto-height

function initData(){return{
  pillars:DEF_PILLARS.map(p=>({...p})),
  rows:DEF_ROWS.map(r=>({...r})),
  owners:DEF_OWNERS.map(o=>({...o})),
  tags:DEF_TAGS.map(t=>({...t})),
  cards:[],
  bridges:{}, // key="cardIdA:cardIdB" → [{id,name,desc,ownerId,status}]
  config:{passSegui:"seguimiento",passEditor:"editor"},
};}

function migrate(d){
  const def=initData();
  if(!d.pillars)d.pillars=def.pillars;
  if(!d.rows)   d.rows=def.rows;
  if(!d.owners) d.owners=def.owners;
  if(!d.tags)   d.tags=def.tags;
  if(!d.cards)  d.cards=[];
  if(!d.bridges)d.bridges={};
  if(!d.config) d.config=def.config;
  d.pillars=d.pillars.map(p=>({w:280,...p}));
  d.rows=d.rows.map(r=>({h:180,...r}));
  d.cards=d.cards.map(c=>({
    steps:[],deps:[],publicado:false,completado:false,
    x:200,y:200,ownerId:"o1",tagIds:[],desc:"",url:"",
    pillarId:null,rowId:null,...c
  }));
  return d;
}

// ── Layout helpers ─────────────────────────────────────────────────────────────
function getPillarX(pillars,idx){
  let x=ROW_LBL_W;
  for(let i=0;i<idx;i++)x+=pillars[i].w;
  return x;
}
function getRowY(rows,idx){
  let y=HDR_H;
  for(let i=0;i<idx;i++)y+=rows[i].h;
  return y;
}
function totalW(pillars){return ROW_LBL_W+pillars.reduce((s,p)=>s+p.w,0)+200;}
function totalH(rows){return HDR_H+rows.reduce((s,r)=>s+r.h,0)+200;}

// Auto row height: ensure row is tall enough for its cards
function computeRowHeights(rows,cards,pillars){
  const result=rows.map(r=>({...r}));
  for(let ri=0;ri<result.length;ri++){
    const row=result[ri];
    const rowCards=cards.filter(c=>c.rowId===row.id);
    if(!rowCards.length){row.h=Math.max(row.h,140);continue;}
    const rowY=getRowY(result,ri);
    let maxBottom=rowY+140;
    rowCards.forEach(c=>{
      const cardH=80+(c.steps||[]).length*28+((c.steps||[]).length?10:0);
      maxBottom=Math.max(maxBottom,c.y+cardH+CARD_PAD);
    });
    row.h=Math.max(140,maxBottom-rowY);
  }
  return result;
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function exportCSV(D){
  const hdr=["Etapa","Pilar","Nombre","Descripción","URL","Owner","Etiquetas","Publicado","Completado","Pasos","Dependencias"];
  const rows=[hdr];
  for(const c of D.cards){
    const row=D.rows.find(r=>r.id===c.rowId);
    const pil=D.pillars.find(p=>p.id===c.pillarId);
    const own=D.owners.find(o=>o.id===c.ownerId);
    const tags=D.tags.filter(t=>c.tagIds.includes(t.id)).map(t=>t.name).join(";");
    const steps=(c.steps||[]).map(s=>`${s.name}(${s.status})`).join(";");
    const deps=(c.deps||[]).map(d=>{const dc=D.cards.find(x=>x.id===d);return dc?dc.name:d;}).join(";");
    rows.push([row?.label||"",pil?.label||"",c.name,c.desc||"",c.url||"",own?.name||"",tags,c.publicado?"Sí":"No",c.completado?"Sí":"No",steps,deps]);
  }
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download="plan-mejora-canvas.csv";a.click();
}

function importCSV(file,D,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const parse=line=>{const r=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){r.push(cur);cur="";}else cur+=ch;}r.push(cur);return r;};
    const newCards=[];
    for(let i=1;i<lines.length;i++){
      const cols=parse(lines[i]);
      if(cols.length<3)continue;
      const rowLabel=cols[0]?.replace(/^"|"$/g,"");
      const pilLabel=cols[1]?.replace(/^"|"$/g,"");
      const name=cols[2]?.replace(/^"|"$/g,"");
      if(!name)continue;
      const row=D.rows.find(r=>r.label===rowLabel);
      const pil=D.pillars.find(p=>p.label===pilLabel);
      newCards.push({
        id:uid(),name,desc:cols[3]?.replace(/^"|"$/g,"")||"",
        url:cols[4]?.replace(/^"|"$/g,"")||"",
        ownerId:D.owners.find(o=>o.name===(cols[5]?.replace(/^"|"$/g,"")))?.id||"o1",
        tagIds:[],publicado:cols[7]==="Sí"||cols[7]==='"Sí"',
        completado:cols[8]==="Sí"||cols[8]==='"Sí"',
        steps:[],deps:[],pillarId:pil?.id||null,rowId:row?.id||null,
        x:ROW_LBL_W+(pil?D.pillars.findIndex(p=>p.id===pil.id)*280:0)+40,
        y:HDR_H+(row?D.rows.findIndex(r=>r.id===row.id)*180:0)+40,
      });
    }
    onDone(newCards);
  };
  reader.readAsText(file);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [D,setD]       =useState(null);
  const [loading,setL] =useState(true);
  const [saved,setSaved]=useState(true);
  const [saveOk,setSaveOk]=useState(true);
  const [layer,setLayer]=useState(L.C);
  const [loginOpen,setLogin]=useState(false);
  const [selCard,setSelCard]=useState(null);
  const [selBridge,setSelBridge]=useState(null); // "cardA:cardB"
  const [panel,setPanel]=useState(null); // "card"|"bridge"|"settings"
  const [hlCard,setHlCard]=useState(null); // card id for highlight
  const [fOwners,setFO]=useState([]);
  const [fTags,setFT]  =useState([]);
  const saveTimer=useRef(null);
  const fileRef=useRef(null);

  useEffect(()=>{
    dbLoad().then(({data})=>{setD(migrate(data||initData()));setL(false);});
  },[]);

  useEffect(()=>{
    if(!D||loading)return;
    setSaved(false);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>dbSave(D).then(ok=>{setSaved(true);setSaveOk(ok);}),900);
    return()=>clearTimeout(saveTimer.current);
  },[D]);

  useEffect(()=>{
    const fn=()=>{if(D)try{localStorage.setItem(LKEY,JSON.stringify(D));}catch(e){}};
    window.addEventListener("beforeunload",fn);
    return()=>window.removeEventListener("beforeunload",fn);
  },[D]);

  const mut=fn=>setD(d=>{const nd=JSON.parse(JSON.stringify(d));fn(nd);return nd;});

  const addCard=(x,y,pillarId,rowId)=>{
    const c={id:uid(),x,y,pillarId,rowId,name:"Nueva entrada",desc:"",url:"",
      ownerId:"o1",tagIds:[],publicado:false,completado:false,steps:[],deps:[]};
    mut(d=>d.cards.push(c));
    setSelCard(c.id);setSelBridge(null);setPanel("card");
  };
  const updateCard=c=>{mut(d=>{const i=d.cards.findIndex(x=>x.id===c.id);if(i>=0)d.cards[i]=c;});};
  const deleteCard=id=>{
    mut(d=>{
      d.cards=d.cards.filter(c=>c.id!==id).map(c=>({...c,deps:c.deps.filter(x=>x!==id)}));
      // Remove bridges involving this card
      Object.keys(d.bridges).forEach(k=>{if(k.includes(id))delete d.bridges[k];});
    });
    setSelCard(null);setPanel(null);
  };
  const moveCard=(id,x,y)=>mut(d=>{const c=d.cards.find(c=>c.id===id);if(c){c.x=x;c.y=y;}});
  const updateBridge=(key,steps)=>mut(d=>{d.bridges[key]=steps;});

  const canEdit=layer===L.E;
  const isPublic=layer===L.C;

  // Related cards for highlight
  const getRelated=id=>{
    if(!id||!D)return new Set();
    const s=new Set([id]);
    const card=D.cards.find(c=>c.id===id);
    if(!card)return s;
    (card.deps||[]).forEach(d=>s.add(d));
    D.cards.forEach(c=>{if((c.deps||[]).includes(id))s.add(c.id);});
    return s;
  };
  const related=getRelated(hlCard);
  const hasFilter=fOwners.length>0||fTags.length>0;
  const isVisible=c=>{
    if(!hasFilter)return true;
    return(!fOwners.length||fOwners.includes(c.ownerId))&&(!fTags.length||fTags.some(t=>c.tagIds.includes(t)));
  };

  if(loading)return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:"9px",letterSpacing:"4px",color:"#388bfd"}}>CARGANDO</div>
      <div style={{fontSize:12,color:"#30363d"}}>Conectando…</div>
    </div>
  );

  const selCardObj=D.cards.find(c=>c.id===selCard);

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Header D={D} layer={layer} saved={saved} saveOk={saveOk} canEdit={canEdit}
        fOwners={fOwners} setFO={setFO} fTags={fTags} setFT={setFT}
        onSettings={()=>{setPanel(p=>p==="settings"?null:"settings");setSelCard(null);setSelBridge(null);}}
        onLogin={()=>setLogin(true)}
        onLogout={()=>{setLayer(L.C);setPanel(null);setSelCard(null);setSelBridge(null);}}
        onExport={()=>exportCSV(D)}
        onImport={()=>fileRef.current?.click()}
        panelOpen={panel}/>

      <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}}
        onChange={e=>{const f=e.target.files[0];if(f)importCSV(f,D,cards=>mut(d=>d.cards.push(...cards)));e.target.value="";}}/>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <Canvas D={D} layer={layer} canEdit={canEdit} isPublic={isPublic}
          selCard={selCard} hlCard={hlCard} related={related} hasFilter={hasFilter} isVisible={isVisible}
          fOwners={fOwners} fTags={fTags}
          onSelectCard={id=>{setSelCard(id);setSelBridge(null);if(id)setPanel("card");else setPanel(null);}}
          onHlCard={id=>setHlCard(id===hlCard?null:id)}
          onSelectBridge={key=>{setSelBridge(key);setSelCard(null);setPanel("bridge");}}
          onMoveCard={moveCard} onAddCard={addCard} onPillarResize={(id,w)=>mut(d=>{const p=d.pillars.find(p=>p.id===id);if(p)p.w=Math.max(180,w);})}
          mut={mut}/>

        {panel==="card"&&selCardObj&&(
          <CardPanel key={selCardObj.id} card={selCardObj} D={D} canEdit={canEdit} isPublic={isPublic}
            onUpdate={updateCard} onDelete={()=>deleteCard(selCardObj.id)}
            onClose={()=>{setPanel(null);setSelCard(null);}}/>
        )}
        {panel==="bridge"&&selBridge&&(
          <BridgePanel bridgeKey={selBridge} D={D} canEdit={canEdit}
            steps={D.bridges[selBridge]||[]}
            onUpdate={steps=>updateBridge(selBridge,steps)}
            onClose={()=>{setPanel(null);setSelBridge(null);}}/>
        )}
        {panel==="settings"&&canEdit&&(
          <SettingsPanel D={D} mut={mut} onClose={()=>setPanel(null)}/>
        )}
      </div>

      {loginOpen&&<LoginModal D={D} onLogin={r=>{setLayer(r);setLogin(false);}} onClose={()=>setLogin(false)}/>}
    </div>
  );
}

      <div style={{marginRight:6}}>
        <div style={{fontSize:"8px",letterSpacing:"4px",color:"#388bfd",marginBottom:1}}>RRHH · CANVAS</div>

      </div>

      <Div/>
      <span style={{fontSize:"8px",color:"#484f58",letterSpacing:"1px"}}>TAGS</span>
      {D.tags.map(t=>{const a=fTags.includes(t.id);return<Chip key={t.id} color={t.color} active={a} onClick={()=>setFT(f=>a?f.filter(x=>x!==t.id):[...f,t.id])}>{t.name}</Chip>;})}
      {hasF&&<button onClick={()=>{setFO([]);setFT([]);}} style={{...BTN,color:"#484f58",borderColor:"transparent"}}>× limpiar</button>}
      <div style={{flex:1}}/>
      {canEdit&&<span style={{fontSize:"9px",color:saved?(saveOk?"#3fb950":"#f0883e"):"#f0883e",minWidth:88}}>{saved?(saveOk?"☁ guardado":"⚠ solo local"):"⏳ guardando…"}</span>}
      {canEdit&&<button onClick={onImport} style={BTN}>↑ CSV</button>}
      {canEdit&&<button onClick={onExport} style={BTN}>↓ CSV</button>}
      {canEdit&&<button onClick={onSettings} style={{...BTN,borderColor:panelOpen==="settings"?"#388bfd":"#30363d",color:panelOpen==="settings"?"#388bfd":"#8b949e"}}>⚙ Config</button>}
      {layer===L.C?<button onClick={onLogin} style={{...BTN,borderColor:"#388bfd",color:"#388bfd"}}>Acceder →</button>
        :<button onClick={onLogout} style={{...BTN,color:"#484f58"}}>← Salir</button>}
    </div>
  );
}

// ── Canvas ─────────────────────────────────────────────────────────────────────
function Canvas({D,layer,canEdit,isPublic,selCard,hlCard,related,hasFilter,isVisible,onSelectCard,onHlCard,onSelectBridge,onMoveCard,onAddCard,onPillarResize,mut}){
  const containerRef=useRef(null);
  const [vp,setVp]=useState({x:0,y:0,scale:1});
  const [size,setSize]=useState({w:1200,h:800});
  const dragging=useRef(null);

  useLayoutEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(()=>{
      if(containerRef.current){const r=containerRef.current.getBoundingClientRect();setSize({w:r.width,h:r.height});}
    });
    ro.observe(containerRef.current);
    const r=containerRef.current.getBoundingClientRect();
    setSize({w:r.width,h:r.height});
    return()=>ro.disconnect();
  },[]);

  // Auto row heights
  const rowsComputed=computeRowHeights(D.rows,D.cards,D.pillars);
  const tw=totalW(D.pillars);
  const th=totalH(rowsComputed);

  const toCanvas=(cx,cy)=>({x:(cx-vp.x)/vp.scale,y:(cy-vp.y)/vp.scale});

  const onPD=e=>{
    e.currentTarget.setPointerCapture(e.pointerId);
    const t=e.target;
    // Column resize handle
    const resizeEl=t.closest('[data-resize-pillar]');
    if(resizeEl&&canEdit){
      const pid=resizeEl.dataset.resizePillar;
      const pil=D.pillars.find(p=>p.id===pid);
      dragging.current={type:"resize",pid,startX:e.clientX,origW:pil.w};
      return;
    }
    // Card drag
    const cardEl=t.closest('[data-cardid]');
    if(cardEl&&canEdit){
      const id=cardEl.dataset.cardid;
      const card=D.cards.find(c=>c.id===id);
      if(!card)return;
      dragging.current={type:"card",id,startX:e.clientX,startY:e.clientY,ox:card.x,oy:card.y};
      onSelectCard(id);
      return;
    }
    // Pan
    dragging.current={type:"pan",startX:e.clientX,startY:e.clientY,ox:vp.x,oy:vp.y};
  };

  const onPM=e=>{
    if(!dragging.current)return;
    const dx=e.clientX-dragging.current.startX;
    const dy=e.clientY-dragging.current.startY;
    if(dragging.current.type==="pan") setVp(v=>({...v,x:dragging.current.ox+dx,y:dragging.current.oy+dy}));
    else if(dragging.current.type==="card") onMoveCard(dragging.current.id,dragging.current.ox+dx/vp.scale,dragging.current.oy+dy/vp.scale);
    else if(dragging.current.type==="resize") onPillarResize(dragging.current.pid,dragging.current.origW+dx/vp.scale);
  };

  const onPU=()=>{dragging.current=null;};

  const onWheel=e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.12:0.9;
    const rect=containerRef.current.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    setVp(v=>{const ns=Math.min(2.5,Math.max(0.15,v.scale*f));const r=ns/v.scale;return{scale:ns,x:mx-(mx-v.x)*r,y:my-(my-v.y)*r};});
  };

  const onDbl=e=>{
    if(!canEdit)return;
    if(e.target.closest('[data-cardid]')||e.target.closest('[data-bridge]'))return;
    const rect=containerRef.current.getBoundingClientRect();
    const {x:cx,y:cy}=toCanvas(e.clientX-rect.left,e.clientY-rect.top);
    const pi=D.pillars.findIndex((_,i)=>{const px=getPillarX(D.pillars,i);return cx>=px&&cx<px+D.pillars[i].w;});
    const pil=D.pillars[pi];
    let rowY=HDR_H, foundRow=null;
    for(const row of rowsComputed){if(cy>=rowY&&cy<rowY+row.h){foundRow=row;break;}rowY+=row.h;}
    onAddCard(cx,cy,pil?.id,foundRow?.id);
  };

  const visCards=isPublic?D.cards.filter(c=>c.publicado):D.cards;

  // Build bezier path between two cards
  const bezier=(ax,ay,bx,by)=>{
    const mx=(ax+bx)/2;
    return `M${ax},${ay} C${mx},${ay} ${mx},${by} ${bx},${by}`;
  };

  // Bridges on arrows
  const arrows=[];
  visCards.forEach(card=>{
    (card.deps||[]).forEach(depId=>{
      const dep=D.cards.find(c=>c.id===depId);
      if(!dep)return;
      const ax=dep.x+CARD_W, ay=dep.y+44;
      const bx=card.x, by=card.y+44;
      const mx=(ax+bx)/2, my=(ay+by)/2;
      const key=`${depId}:${card.id}`;
      const hasSteps=(D.bridges[key]||[]).length>0;
      const vis=isVisible(card)&&isVisible(dep);
      arrows.push({key,ax,ay,bx,by,mx,my,hasSteps,vis,fromId:depId,toId:card.id});
    });
  });

  return(
    <div ref={containerRef} style={{flex:1,overflow:"hidden",position:"relative",cursor:"grab",background:"#0d1117"}}
      onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerCancel={onPU}
      onWheel={onWheel} onDoubleClick={onDbl}
      onClick={e=>{if(!e.target.closest('[data-cardid]')&&!e.target.closest('[data-bridge]')&&!e.target.closest('[data-resize-pillar]'))onSelectCard(null);}}>

      <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",overflow:"visible"}}>
        <defs>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,1.5 L7,4 L0,6.5 Z" fill="#388bfd" opacity="0.8"/>
          </marker>
          <marker id="arr-hl" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,1.5 L7,4 L0,6.5 Z" fill="#f0883e"/>
          </marker>
        </defs>
        <g transform={`translate(${vp.x},${vp.y}) scale(${vp.scale})`}>

          {/* Row bands */}
          {rowsComputed.map((row,ri)=>{
            const ry=getRowY(rowsComputed,ri);
            return(
              <g key={row.id}>
                <rect x={0} y={ry} width={tw} height={row.h} fill={ri%2===0?"#0d1117":"#0f131a"}/>
                <rect x={0} y={ry} width={ROW_LBL_W-1} height={row.h} fill="#161b22"/>
                <line x1={ROW_LBL_W-1} y1={ry} x2={ROW_LBL_W-1} y2={ry+row.h} stroke="#21262d" strokeWidth={1}/>
                <text x={ROW_LBL_W/2} y={ry+row.h/2} textAnchor="middle" dominantBaseline="middle"
                  fontSize={11} fontWeight={600} fill="#484f58" style={{userSelect:"none"}}>{row.label}</text>
                <line x1={0} y1={ry+row.h} x2={tw} y2={ry+row.h} stroke="#21262d" strokeWidth={1}/>
              </g>
            );
          })}

          {/* Pillar zones + resize handles */}
          {D.pillars.map((p,pi)=>{
            const px=getPillarX(D.pillars,pi);
            return(
              <g key={p.id}>
                <rect x={px} y={0} width={p.w} height={th} fill={p.color} opacity={0.35}/>
                {/* Header */}
                <rect x={px} y={0} width={p.w} height={HDR_H} fill={p.color}/>
                <line x1={px} y1={HDR_H} x2={px+p.w} y2={HDR_H} stroke={p.border} strokeWidth={1.5}/>
                <text x={px+p.w/2} y={HDR_H/2} textAnchor="middle" dominantBaseline="middle"
                  fontSize={12} fontWeight={700} fill={p.hl} style={{userSelect:"none",letterSpacing:"0.3px"}}>{p.label}</text>
                {/* Right border + resize handle */}
                <line x1={px+p.w} y1={0} x2={px+p.w} y2={th} stroke={p.border} strokeWidth={1}/>
                {canEdit&&(
                  <rect data-resize-pillar={p.id} x={px+p.w-4} y={0} width={8} height={th}
                    fill="transparent" className="col-resize"
                    style={{cursor:"col-resize"}}/>
                )}
              </g>
            );
          })}

          {/* Arrows */}
          {arrows.map(a=>{
            const isHl=hlCard&&(related.has(a.fromId)||related.has(a.toId))&&related.has(a.fromId)&&related.has(a.toId);
            const dim=hlCard&&!isHl;
            const path=bezier(a.ax,a.ay,a.bx,a.by);
            return(
              <g key={a.key}>
                <path d={path} stroke={isHl?"#f0883e":"#388bfd"} strokeWidth={isHl?2:1.5}
                  fill="none" strokeOpacity={dim?0.08:a.vis?0.6:0.15}
                  markerEnd={isHl?"url(#arr-hl)":"url(#arr)"}/>
                {/* Bridge button at midpoint */}
                {canEdit&&a.vis&&(
                  <g data-bridge={a.key} style={{cursor:"pointer"}}
                    onClick={e=>{e.stopPropagation();onSelectBridge(a.key);}}>
                    <circle cx={a.mx} cy={a.my} r={10}
                      fill={a.hasSteps?"#1f4080":"#161b22"}
                      stroke={a.hasSteps?"#388bfd":"#30363d"} strokeWidth={1.5}/>
                    <text x={a.mx} y={a.my} textAnchor="middle" dominantBaseline="middle"
                      fontSize={12} fill={a.hasSteps?"#388bfd":"#484f58"} style={{userSelect:"none"}}>
                      {a.hasSteps?"◈":"⊕"}
                    </text>
                    {a.hasSteps&&(
                      <text x={a.mx+14} y={a.my} dominantBaseline="middle"
                        fontSize={9} fill="#388bfd" style={{userSelect:"none"}}>
                        {(D.bridges[a.key]||[]).length}
                      </text>
                    )}
                  </g>
                )}
              </g>
            );
          })}

          {/* Cards */}
          {visCards.map(card=>{
            const owner=D.owners.find(o=>o.id===card.ownerId)||D.owners[0];
            const tags=D.tags.filter(t=>card.tagIds.includes(t.id));
            const pillar=D.pillars.find(p=>p.id===card.pillarId);
            const isSel=selCard===card.id;
            const isHl=hlCard&&related.has(card.id);
            const isDim=hlCard&&!related.has(card.id);
            const isF=(hasFilter&&!isVisible(card));
            const steps=card.steps||[];
            const doneN=steps.filter(s=>s.status==="completado").length;
            const blocked=steps.some(s=>s.status==="bloqueado");
            const pct=steps.length?doneN/steps.length:0;
            return(
              <foreignObject key={card.id} x={card.x} y={card.y} width={CARD_W} height={400} style={{overflow:"visible"}}>
                <div xmlns="http://www.w3.org/1999/xhtml" data-cardid={card.id} className="card"
                  style={{
                    width:CARD_W,background:card.completado?"#0d1f12":blocked?"#1a0d0d":"#161b22",
                    border:`1.5px solid ${isSel?(pillar?.hl||"#388bfd"):isHl?"#f0883e":card.completado?"#238636":blocked?"#f85149":(pillar?.border||"#21262d")}`,
                    borderTop:`3px solid ${owner.color}`,borderRadius:7,padding:"9px 10px 8px",
                    opacity:isF?0.06:isDim?0.15:1,
                    boxShadow:isSel?`0 0 0 2px ${pillar?.hl||"#388bfd"}44,0 6px 20px #00000077`:isHl?"0 0 0 2px #f0883e44":"0 2px 6px #00000055",
                    cursor:canEdit?"grab":"pointer",
                  }}>
                  {/* Name + HL button */}
                  <div style={{display:"flex",gap:5,alignItems:"flex-start",marginBottom:5}}>
                    <div style={{flex:1,fontSize:12,fontWeight:600,color:card.completado?"#3fb950":isHl?"#f0883e":"#e6edf3",lineHeight:1.35}}>
                      {card.completado&&"✓ "}{card.name}
                    </div>
                    <div className="card-actions" style={{display:"flex",gap:3,flexShrink:0}}>
                      <button onClick={e=>{e.stopPropagation();onHlCard(card.id);}}
                        title="Ver relaciones"
                        style={{background:"none",border:`1px solid ${isHl?"#f0883e":"#21262d"}`,color:isHl?"#f0883e":"#30363d",cursor:"pointer",width:18,height:18,borderRadius:3,fontSize:9,lineHeight:1,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>◎</button>
                    </div>
                  </div>
                  {/* Pillar badge */}
                  {pillar&&<div style={{fontSize:"8px",padding:"1px 5px",borderRadius:3,background:pillar.color,color:pillar.hl,border:`1px solid ${pillar.border}`,display:"inline-block",marginBottom:5,fontWeight:600}}>{pillar.label}</div>}
                  {/* Owner */}
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:owner.color,flexShrink:0}}/>
                    <span style={{fontSize:10,color:owner.color,fontWeight:500}}>{owner.name}</span>
                  </div>
                  {/* Tags */}
                  {tags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:5}}>
                    {tags.map(t=><span key={t.id} style={{fontSize:"8px",padding:"1px 5px",borderRadius:10,background:t.color+"22",color:t.color,border:`1px solid ${t.color}33`,fontWeight:500}}>{t.name}</span>)}
                  </div>}
                  {/* Progress */}
                  {steps.length>0&&<div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{fontSize:"8px",color:"#484f58"}}>Pasos</span>
                      <span style={{fontSize:"8px",color:blocked?"#f85149":pct===1?"#3fb950":"#484f58",fontWeight:600}}>{doneN}/{steps.length}</span>
                    </div>
                    <div style={{height:3,background:"#21262d",borderRadius:2}}>
                      <div style={{height:"100%",width:`${pct*100}%`,background:blocked?"#f85149":"#3fb950",borderRadius:2}}/>
                    </div>
                  </div>}
                  {card.url&&<div style={{marginTop:4,fontSize:"8px",color:"#388bfd"}}>🔗</div>}
                </div>
              </foreignObject>
            );
          })}
        </g>
      </svg>

      {/* Zoom controls */}
      <div style={{position:"absolute",bottom:12,right:12,display:"flex",flexDirection:"column",gap:4,zIndex:10}}>
        {[["+",(v)=>Math.min(2.5,v*1.2)],["−",(v)=>Math.max(0.15,v/1.2)],["⌂",()=>1]].map(([lbl,fn])=>(
          <button key={lbl} onClick={()=>setVp(v=>lbl==="⌂"?{x:0,y:0,scale:1}:{...v,scale:fn(v.scale)})}
            style={{width:28,height:28,background:"#161b22",border:"1px solid #30363d",color:"#8b949e",cursor:"pointer",borderRadius:4,fontSize:lbl==="⌂"?9:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {lbl}
          </button>
        ))}
      </div>
      {canEdit&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",fontSize:"9px",color:"#21262d",letterSpacing:"1px",pointerEvents:"none",whiteSpace:"nowrap"}}>
        Doble clic para añadir · Arrastra para mover · Rueda para zoom
      </div>}
    </div>
  );
}

// ── Card Panel ─────────────────────────────────────────────────────────────────
function CardPanel({card,D,canEdit,isPublic,onUpdate,onDelete,onClose}){
  const [f,setF]=useState({...card,steps:(card.steps||[]).map(s=>({...s}))});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{setF({...card,steps:(card.steps||[]).map(s=>({...s}))});},[card.id]);
  const save=()=>onUpdate(f);
  const owner=D.owners.find(o=>o.id===f.ownerId)||D.owners[0];
  const pillar=D.pillars.find(p=>p.id===f.pillarId);
  const addStep=()=>setF(p=>({...p,steps:[...p.steps,{id:uid(),name:"Nuevo paso",desc:"",ownerId:p.ownerId,status:"pendiente"}]}));
  const upStep=(id,k,v)=>setF(p=>({...p,steps:p.steps.map(s=>s.id===id?{...s,[k]:v}:s)}));
  const delStep=id=>setF(p=>({...p,steps:p.steps.filter(s=>s.id!==id)}));

  if(isPublic)return(
    <div className="fade-up" style={{width:320,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"14px",background:pillar?.color||"#161b22",borderBottom:`1px solid ${pillar?.border||"#21262d"}`}}>
        <button onClick={onClose} style={{float:"right",background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
        {pillar&&<div style={{fontSize:"8px",letterSpacing:"2px",color:pillar.hl,marginBottom:3,fontWeight:600}}>{pillar.label}</div>}
        <div style={{fontSize:17,fontWeight:700,color:"#e6edf3",lineHeight:1.3}}>{card.name}</div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:12}}>
        {card.desc&&<p style={{fontSize:13,color:"#8b949e",lineHeight:1.7}}>{card.desc}</p>}
        <div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:8,height:8,borderRadius:"50%",background:owner.color}}/><span style={{fontSize:12,color:owner.color,fontWeight:600}}>{owner.name}</span></div>
        {D.tags.filter(t=>card.tagIds.includes(t.id)&&t.tipo==="publicada").map(t=>(
          <span key={t.id} style={{fontSize:10,background:t.color+"22",color:t.color,padding:"3px 10px",borderRadius:20,border:`1px solid ${t.color}44`,fontWeight:500,alignSelf:"flex-start"}}>{t.name}</span>
        ))}
        {card.url&&<a href={card.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#21262d",borderRadius:6,color:"#388bfd",fontSize:12,fontWeight:600,textDecoration:"none"}}>🔗 Abrir documento →</a>}
      </div>
    </div>
  );

  return(
    <div className="fade-up" style={{width:340,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"11px 13px",background:pillar?.color||"#161b22",borderBottom:`1px solid ${pillar?.border||"#21262d"}`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          {pillar&&<div style={{fontSize:"8px",letterSpacing:"1.5px",color:pillar.hl,marginBottom:2,fontWeight:600}}>{pillar.label}</div>}
          <div style={{fontSize:12,fontWeight:700,color:"#e6edf3"}}>Editar entrada</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>✕</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:13,display:"flex",flexDirection:"column",gap:11}}>
        <div style={{display:"flex",gap:6}}>
          <Tog active={f.publicado} color="#388bfd" onClick={()=>set("publicado",!f.publicado)} label={f.publicado?"◆ Pub":"◇ Priv"}/>
          <Tog active={f.completado} color="#3fb950" onClick={()=>set("completado",!f.completado)} label={f.completado?"✓ Hecho":"○ En curso"}/>
        </div>
        <Fld label="NOMBRE"><input value={f.name} onChange={e=>set("name",e.target.value)} style={INP}/></Fld>
        <Fld label="DESCRIPCIÓN"><textarea value={f.desc} onChange={e=>set("desc",e.target.value)} rows={3} style={{...INP,resize:"vertical",lineHeight:1.6}}/></Fld>
        <Fld label="ENLACE">
          <input value={f.url} onChange={e=>set("url",e.target.value)} placeholder="https://…" style={INP}/>
          {f.url&&<a href={f.url} target="_blank" rel="noreferrer" style={{fontSize:9,color:"#388bfd",display:"block",marginTop:2}}>↗ abrir</a>}
        </Fld>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          <Fld label="PILAR">
            <select value={f.pillarId||""} onChange={e=>set("pillarId",e.target.value)} style={INP}>
              <option value="">—</option>
              {D.pillars.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
          </Fld>
          <Fld label="ETAPA">
            <select value={f.rowId||""} onChange={e=>set("rowId",e.target.value)} style={INP}>
              <option value="">—</option>
              {D.rows.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
            </select>
          </Fld>
        </div>
        <Fld label="OWNER">
          <select value={f.ownerId} onChange={e=>set("ownerId",e.target.value)} style={{...INP,color:owner.color}}>
            {D.owners.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
          </select>
          <div style={{height:2,borderRadius:1,marginTop:3,background:owner.color}}/>
        </Fld>
        <Fld label="ETIQUETAS">
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {D.tags.map(t=>{const sel=f.tagIds.includes(t.id);return<Chip key={t.id} color={t.color} active={sel} onClick={()=>set("tagIds",sel?f.tagIds.filter(x=>x!==t.id):[...f.tagIds,t.id])}>{t.tipo==="publicada"&&"◆ "}{t.name}</Chip>;})}
          </div>
        </Fld>
        <Fld label="DEPENDENCIAS">
          <DepSel value={f.deps} onChange={v=>set("deps",v)} cards={D.cards} currentId={card.id} D={D}/>
        </Fld>
        <Fld label={`PASOS (${f.steps.length})`}>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {f.steps.map((step)=>{
              const st=STEP_ST.find(s=>s.id===step.status)||STEP_ST[0];
              const sOwner=D.owners.find(o=>o.id===step.ownerId)||D.owners[0];
              return(
                <div key={step.id} style={{background:"#0d1117",border:"1px solid #21262d",borderLeft:`2px solid ${st.color}`,borderRadius:5,padding:"7px 8px"}}>
                  <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:5}}>
                    <button onClick={()=>upStep(step.id,"status",nextSt(step.status))}
                      style={{background:"#161b22",border:`1px solid ${st.color}`,color:st.color,cursor:"pointer",padding:"1px 6px",borderRadius:8,fontSize:"8px",fontWeight:600,fontFamily:"inherit",flexShrink:0}}>
                      {st.label}
                    </button>
                    <input value={step.name} onChange={e=>upStep(step.id,"name",e.target.value)}
                      style={{...INP,flex:1,padding:"2px 5px",fontSize:11,fontWeight:600}}/>
                    <button onClick={()=>delStep(step.id)} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:11,padding:0,flexShrink:0}}>✕</button>
                  </div>
                  <textarea value={step.desc||""} onChange={e=>upStep(step.id,"desc",e.target.value)}
                    rows={1} placeholder="Descripción…" style={{...INP,fontSize:10,resize:"none",marginBottom:4,lineHeight:1.5}}/>
                  <select value={step.ownerId||""} onChange={e=>upStep(step.id,"ownerId",e.target.value)}
                    style={{...INP,fontSize:9,padding:"2px 4px",color:sOwner.color}}>
                    {D.owners.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
                  </select>
                </div>
              );
            })}
          </div>
          <button onClick={addStep} style={{...BTN,width:"100%",marginTop:5,borderStyle:"dashed",padding:"4px"}}>+ paso</button>
        </Fld>
      </div>
      <div style={{padding:"9px 13px",borderTop:"1px solid #21262d",display:"flex",gap:7,flexShrink:0}}>
        <button onClick={()=>{save();onClose();}} style={{flex:1,background:"#1f6feb",border:"none",color:"#fff",padding:"7px",cursor:"pointer",fontSize:11,borderRadius:4,fontFamily:"inherit",fontWeight:700}}>GUARDAR</button>
        <button onClick={save} style={{...BTN,padding:"7px 9px",fontSize:10}}>💾</button>
        <button onClick={()=>{if(window.confirm("¿Eliminar?"))onDelete();}} style={{...BTN,padding:"7px 9px",color:"#f85149",borderColor:"#f8514933"}}>🗑</button>
      </div>
    </div>
  );
}

// ── Bridge Panel ───────────────────────────────────────────────────────────────
function BridgePanel({bridgeKey,D,canEdit,steps,onUpdate,onClose}){
  const [f,setF]=useState(steps.map(s=>({...s})));
  const [fromId,toId]=bridgeKey.split(":");
  const fromCard=D.cards.find(c=>c.id===fromId);
  const toCard=D.cards.find(c=>c.id===toId);
  const addStep=()=>setF(p=>[...p,{id:uid(),name:"Paso intermedio",desc:"",ownerId:"o1",status:"pendiente"}]);
  const upStep=(id,k,v)=>setF(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));
  const delStep=id=>setF(p=>p.filter(s=>s.id!==id));
  const save=()=>onUpdate(f);
  return(
    <div className="fade-up" style={{width:320,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"11px 13px",background:"#1f2d3d",borderBottom:"1px solid #1f4080",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"8px",letterSpacing:"1.5px",color:"#388bfd",marginBottom:2,fontWeight:600}}>PASOS INTERMEDIOS</div>
          <div style={{fontSize:11,color:"#e6edf3",lineHeight:1.4}}>
            <span style={{color:"#8b949e"}}>{fromCard?.name}</span>
            <span style={{color:"#388bfd"}}> → </span>
            <span style={{color:"#8b949e"}}>{toCard?.name}</span>
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>✕</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:13,display:"flex",flexDirection:"column",gap:8}}>
        <p style={{fontSize:9,color:"#484f58",lineHeight:1.6}}>Estos pasos son necesarios para ir de A a B pero no pertenecen a ninguna de las dos entradas.</p>
        {f.map(step=>{
          const st=STEP_ST.find(s=>s.id===step.status)||STEP_ST[0];
          const sOwner=D.owners.find(o=>o.id===step.ownerId)||D.owners[0];
          return(
            <div key={step.id} style={{background:"#0d1117",border:"1px solid #21262d",borderLeft:`2px solid ${st.color}`,borderRadius:5,padding:"7px 8px"}}>
              <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:5}}>
                <button onClick={()=>upStep(step.id,"status",nextSt(step.status))}
                  style={{background:"#161b22",border:`1px solid ${st.color}`,color:st.color,cursor:"pointer",padding:"1px 6px",borderRadius:8,fontSize:"8px",fontWeight:600,fontFamily:"inherit",flexShrink:0}}>
                  {st.label}
                </button>
                <input value={step.name} onChange={e=>upStep(step.id,"name",e.target.value)}
                  style={{...INP,flex:1,padding:"2px 5px",fontSize:11,fontWeight:600}}/>
                <button onClick={()=>delStep(step.id)} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:11,padding:0,flexShrink:0}}>✕</button>
              </div>
              <textarea value={step.desc||""} onChange={e=>upStep(step.id,"desc",e.target.value)}
                rows={1} placeholder="Descripción del paso…" style={{...INP,fontSize:10,resize:"none",marginBottom:4,lineHeight:1.5}}/>
              <select value={step.ownerId||""} onChange={e=>upStep(step.id,"ownerId",e.target.value)}
                style={{...INP,fontSize:9,padding:"2px 4px",color:sOwner.color}}>
                {D.owners.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
              </select>
            </div>
          );
        })}
        <button onClick={addStep} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"5px"}}>+ paso intermedio</button>
      </div>
      <div style={{padding:"9px 13px",borderTop:"1px solid #21262d",display:"flex",gap:7,flexShrink:0}}>
        <button onClick={()=>{save();onClose();}} style={{flex:1,background:"#1f6feb",border:"none",color:"#fff",padding:"7px",cursor:"pointer",fontSize:11,borderRadius:4,fontFamily:"inherit",fontWeight:700}}>GUARDAR</button>
        <button onClick={save} style={{...BTN,padding:"7px 9px",fontSize:10}}>💾</button>
      </div>
    </div>
  );
}

// ── Settings ───────────────────────────────────────────────────────────────────
function SettingsPanel({D,mut,onClose}){
  const move=(arr,i,dir)=>{const a=[...arr];const ni=i+dir;if(ni<0||ni>=a.length)return a;[a[i],a[ni]]=[a[ni],a[i]];return a;};
  const addOwner=()=>mut(d=>d.owners.push({id:"o"+uid(),name:"Nuevo responsable",color:"#388bfd"}));
  const upOwner=(id,k,v)=>mut(d=>{const o=d.owners.find(o=>o.id===id);if(o)o[k]=v;});
  const delOwner=id=>mut(d=>{if(d.owners.length<=1)return;d.owners=d.owners.filter(o=>o.id!==id);const fb=d.owners[0].id;d.cards=d.cards.map(c=>({...c,ownerId:c.ownerId===id?fb:c.ownerId}));});
  const movOwner=(i,dir)=>mut(d=>{d.owners=move(d.owners,i,dir);});
  const addTag=()=>mut(d=>d.tags.push({id:"tg"+uid(),name:"Nueva etiqueta",color:"#388bfd",tipo:"interna"}));
  const upTag=(id,k,v)=>mut(d=>{const t=d.tags.find(t=>t.id===id);if(t)t[k]=v;});
  const delTag=id=>mut(d=>{d.tags=d.tags.filter(t=>t.id!==id);d.cards=d.cards.map(c=>({...c,tagIds:c.tagIds.filter(x=>x!==id)}));});
  const movTag=(i,dir)=>mut(d=>{d.tags=move(d.tags,i,dir);});
  const addRow=()=>mut(d=>d.rows.push({id:"r"+uid(),label:"Nueva etapa",h:180}));
  const upRow=(id,k,v)=>mut(d=>{const r=d.rows.find(r=>r.id===id);if(r)r[k]=v;});
  const delRow=id=>mut(d=>{d.rows=d.rows.filter(r=>r.id!==id);d.cards=d.cards.map(c=>({...c,rowId:c.rowId===id?null:c.rowId}));});
  const movRow=(i,dir)=>mut(d=>{d.rows=move(d.rows,i,dir);});
  const upPillar=(id,k,v)=>mut(d=>{const p=d.pillars.find(p=>p.id===id);if(p)p[k]=v;});
  const upConf=(k,v)=>mut(d=>{d.config[k]=v;});

  return(
    <div style={{width:300,background:"#161b22",borderLeft:"1px solid #21262d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      <div style={{padding:"11px 13px",borderBottom:"1px solid #21262d",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:11,color:"#3fb950",fontWeight:700,letterSpacing:"0.5px"}}>⚙ CONFIGURACIÓN</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>✕</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:13,display:"flex",flexDirection:"column",gap:18}}>

        <Sec title="CONTRASEÑAS">
          <Fld label="SEGUIMIENTO"><input value={D.config?.passSegui||""} onChange={e=>upConf("passSegui",e.target.value)} style={INP}/></Fld>
          <div style={{height:7}}/>
          <Fld label="EDITOR"><input value={D.config?.passEditor||""} onChange={e=>upConf("passEditor",e.target.value)} style={INP}/></Fld>
        </Sec>

        <Sec title="PILARES">
          {D.pillars.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
              <input type="color" value={p.hl} onChange={e=>upPillar(p.id,"hl",e.target.value)}
                style={{width:26,height:26,border:"2px solid #21262d",borderRadius:3,background:"none",cursor:"pointer",padding:2,flexShrink:0}}/>
              <input value={p.label} onChange={e=>upPillar(p.id,"label",e.target.value)}
                style={{...INP,flex:1,padding:"3px 6px",fontSize:11,borderColor:p.hl+"55"}}/>
            </div>
          ))}
        </Sec>

        <Sec title="ETAPAS DEL CICLO">
          {D.rows.map((r,i)=>(
            <div key={r.id} style={{display:"flex",gap:4,marginBottom:5,alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <SmBtn onClick={()=>movRow(i,-1)} disabled={i===0}>↑</SmBtn>
                <SmBtn onClick={()=>movRow(i,1)} disabled={i===D.rows.length-1}>↓</SmBtn>
              </div>
              <input value={r.label} onChange={e=>upRow(r.id,"label",e.target.value)} style={{...INP,flex:1,padding:"3px 6px",fontSize:11}}/>
              <SmBtn danger onClick={()=>{if(window.confirm(`¿Eliminar "${r.label}"?`))delRow(r.id);}}>✕</SmBtn>
            </div>
          ))}
          <button onClick={addRow} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"4px",marginTop:3}}>+ etapa</button>
        </Sec>

        <Sec title="OWNERS">
          {D.owners.map((o,i)=>(
            <div key={o.id} style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <SmBtn onClick={()=>movOwner(i,-1)} disabled={i===0}>↑</SmBtn>
                <SmBtn onClick={()=>movOwner(i,1)} disabled={i===D.owners.length-1}>↓</SmBtn>
              </div>
              <input type="color" value={o.color} onChange={e=>upOwner(o.id,"color",e.target.value)}
                style={{width:26,height:26,border:"2px solid #21262d",borderRadius:3,background:"none",cursor:"pointer",padding:2,flexShrink:0}}/>
              <input value={o.name} onChange={e=>upOwner(o.id,"name",e.target.value)} style={{...INP,flex:1,padding:"3px 6px",fontSize:11,borderColor:o.color+"55"}}/>
              <SmBtn danger onClick={()=>delOwner(o.id)}>✕</SmBtn>
            </div>
          ))}
          <button onClick={addOwner} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"4px",marginTop:3}}>+ owner</button>
        </Sec>

        <Sec title="ETIQUETAS">
          <p style={{fontSize:8,color:"#484f58",marginBottom:8,lineHeight:1.5}}>◆ Publicada = visible en vista pública</p>
          {D.tags.map((t,i)=>(
            <div key={t.id} style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <SmBtn onClick={()=>movTag(i,-1)} disabled={i===0}>↑</SmBtn>
                <SmBtn onClick={()=>movTag(i,1)} disabled={i===D.tags.length-1}>↓</SmBtn>
              </div>
              <input type="color" value={t.color} onChange={e=>upTag(t.id,"color",e.target.value)}
                style={{width:26,height:26,border:"2px solid #21262d",borderRadius:3,background:"none",cursor:"pointer",padding:2,flexShrink:0}}/>
              <input value={t.name} onChange={e=>upTag(t.id,"name",e.target.value)} style={{...INP,flex:1,padding:"3px 6px",fontSize:11,borderColor:t.color+"55"}}/>
              <button onClick={()=>upTag(t.id,"tipo",t.tipo==="publicada"?"interna":"publicada")}
                style={{background:t.tipo==="publicada"?"#0d2818":"#1c2128",border:`1px solid ${t.tipo==="publicada"?"#238636":"#30363d"}`,color:t.tipo==="publicada"?"#3fb950":"#484f58",cursor:"pointer",padding:"2px 5px",borderRadius:3,fontSize:8,fontWeight:700,flexShrink:0}}>
                {t.tipo==="publicada"?"◆":"○"}
              </button>
              <SmBtn danger onClick={()=>delTag(t.id)}>✕</SmBtn>
            </div>
          ))}
          <button onClick={addTag} style={{...BTN,width:"100%",borderStyle:"dashed",padding:"4px",marginTop:3}}>+ etiqueta</button>
        </Sec>
      </div>
    </div>
  );
}

// ── Dep select ────────────────────────────────────────────────────────────────
function DepSel({value,onChange,cards,currentId,D}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);
  const others=cards.filter(c=>c.id!==currentId);
  const filtered=q?others.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())):others;
  const toggle=id=>onChange(value.includes(id)?value.filter(x=>x!==id):[...value,id]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{...INP,textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",color:value.length?"#e6edf3":"#484f58"}}>
        <span>{value.length?`${value.length} dependencia${value.length>1?"s":""}`:"Seleccionar…"}</span>
        <span style={{color:"#484f58",fontSize:10}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:500,background:"#161b22",border:"1px solid #30363d",borderRadius:5,marginTop:2,boxShadow:"0 8px 24px #000b",maxHeight:190,display:"flex",flexDirection:"column"}}>
          <div style={{padding:4,borderBottom:"1px solid #21262d",flexShrink:0}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar…" autoFocus style={{...INP,padding:"3px 6px",fontSize:10}}/>
          </div>
          <div style={{overflow:"auto",flex:1}}>
            {filtered.length===0&&<div style={{padding:"7px 9px",fontSize:10,color:"#484f58"}}>Sin resultados</div>}
            {filtered.map(c=>{
              const p=D.pillars.find(x=>x.id===c.pillarId);const sel=value.includes(c.id);
              return(
                <div key={c.id} onClick={()=>toggle(c.id)} style={{padding:"5px 8px",cursor:"pointer",display:"flex",gap:6,alignItems:"flex-start",background:sel?"#1f2d3d":"transparent",borderBottom:"1px solid #0d1117"}}>
                  <input type="checkbox" checked={sel} readOnly style={{marginTop:2,accentColor:"#388bfd",flexShrink:0,cursor:"pointer"}}/>
                  <div><div style={{fontSize:11,color:sel?"#e6edf3":"#6e7681",lineHeight:1.3}}>{c.name}</div>{p&&<div style={{fontSize:8,color:p.hl,marginTop:1}}>{p.label}</div>}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Login Modal ───────────────────────────────────────────────────────────────
function LoginModal({D,onLogin,onClose}){
  const [pass,setPass]=useState("");
  const [err,setErr]=useState(false);
  const check=()=>{
    if(pass===D.config?.passEditor){onLogin(L.E);return;}
    if(pass===D.config?.passSegui){onLogin(L.S);return;}
    setErr(true);setTimeout(()=>setErr(false),1400);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:26,width:310,display:"flex",flexDirection:"column",gap:13}}>
        <div style={{fontSize:"8px",letterSpacing:"4px",color:"#388bfd",textAlign:"center"}}>ACCESO RESTRINGIDO</div>
        <div style={{fontSize:17,fontWeight:700,color:"#e6edf3",textAlign:"center"}}>Introduce la contraseña</div>
        <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Contraseña…" autoFocus
          style={{...INP,fontSize:13,padding:"8px 11px",textAlign:"center",letterSpacing:"3px",borderColor:err?"#f85149":"#30363d"}}/>
        {err&&<div style={{fontSize:11,color:"#f85149",textAlign:"center"}}>Contraseña incorrecta</div>}
        <div style={{display:"flex",gap:7}}>
          <button onClick={onClose} style={{flex:1,...BTN,padding:"8px"}}>Cancelar</button>
          <button onClick={check} style={{flex:2,background:"#1f6feb",border:"none",color:"#fff",padding:"8px",cursor:"pointer",fontSize:12,borderRadius:4,fontFamily:"inherit",fontWeight:700}}>Acceder</button>
        </div>
      </div>
    </div>
  );
}

// ── Micro ─────────────────────────────────────────────────────────────────────
const Fld=({label,children})=>(<div><div style={{fontSize:"7px",letterSpacing:"2px",color:"#484f58",marginBottom:3,fontWeight:700}}>{label}</div>{children}</div>);
const Sec=({title,children})=>(<div><div style={{fontSize:"8px",letterSpacing:"2px",color:"#30363d",marginBottom:8,paddingBottom:4,borderBottom:"1px solid #21262d",fontWeight:700}}>{title}</div>{children}</div>);
const Chip=({children,color,active,onClick})=>(<button onClick={onClick} style={{fontSize:9,padding:"2px 8px",borderRadius:20,border:`1.5px solid ${color}`,background:active?color:"transparent",color:active?"#fff":color,cursor:"pointer",transition:"all .12s",fontFamily:"inherit",fontWeight:600,lineHeight:1.4}}>{children}</button>);
const Tog=({active,color,onClick,label})=>(<button onClick={onClick} style={{flex:1,fontSize:9,padding:"3px 7px",borderRadius:4,border:`1px solid ${active?color:"#30363d"}`,background:active?color+"22":"transparent",color:active?color:"#484f58",cursor:"pointer",fontFamily:"inherit",fontWeight:600,transition:"all .15s"}}>{label}</button>);
const SmBtn=({children,onClick,disabled,danger})=>(<button onClick={disabled?undefined:onClick} style={{background:"none",border:`1px solid ${danger?"#3f1010":disabled?"#161b22":"#21262d"}`,color:danger?"#6e2020":disabled?"#21262d":"#484f58",cursor:disabled?"default":"pointer",padding:"1px 4px",borderRadius:2,fontSize:"8px",lineHeight:1}}>{children}</button>);
const Div=()=>(<div style={{width:1,height:22,background:"#21262d",margin:"0 3px",flexShrink:0}}/>);
const INP={background:"#0d1117",border:"1px solid #30363d",color:"#e6edf3",padding:"5px 7px",fontSize:11,borderRadius:4,fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box"};
const BTN={background:"transparent",border:"1px solid #30363d",color:"#8b949e",cursor:"pointer",padding:"3px 9px",fontSize:9,letterSpacing:"0.3px",borderRadius:4,fontFamily:"inherit"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
